version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: troxe-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: troxe_panel
      POSTGRES_USER: troxe
      POSTGRES_PASSWORD: ${DB_PASSWORD:-troxe_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U troxe -d troxe_panel"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - troxe-internal

  # Redis
  redis:
    image: redis:7-alpine
    container_name: troxe-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - troxe-internal

  # Troxe Panel (API + Frontend)
  panel:
    build:
      context: .
      dockerfile: docker/Dockerfile.panel
    container_name: troxe-panel
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://troxe:${DB_PASSWORD:-troxe_secret}@db:5432/troxe_panel
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-real-secret-at-least-32-chars}
      JWT_COOKIE_SECRET: ${JWT_COOKIE_SECRET:-change-me-cookie-secret-16chars}
      PANEL_URL: ${PANEL_URL:-http://localhost:3000}
      PANEL_PORT: "3001"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-byte-encryption-key!!}
      NODE_ENV: production
      LOG_LEVEL: info
    volumes:
      - panel-uploads:/app/uploads
    ports:
      - "127.0.0.1:3001:3001"
    security_opt:
      - no-new-privileges:true
    networks:
      - troxe-internal

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: troxe-frontend
    restart: unless-stopped
    depends_on:
      - panel
    environment:
      NEXT_PUBLIC_API_URL: ${PANEL_URL:-http://localhost:3001}
      NODE_ENV: production
    ports:
      - "3000:3000"
    security_opt:
      - no-new-privileges:true
    networks:
      - troxe-internal

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: troxe-caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - panel
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    security_opt:
      - no-new-privileges:true
    networks:
      - troxe-internal

  # Node Agent (manages Docker containers on this host)
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    container_name: troxe-agent
    restart: unless-stopped
    depends_on:
      - panel
    environment:
      PANEL_URL: ${PANEL_URL:-http://panel:3001}
      DAEMON_TOKEN: ${AGENT_DAEMON_TOKEN:?set AGENT_DAEMON_TOKEN in .env}
      NODE_ID: ${AGENT_NODE_ID:?set AGENT_NODE_ID in .env}
      LISTEN_PORT: "8080"
      DATA_DIRECTORY: /var/lib/troxe
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - agent-data:/var/lib/troxe
    security_opt:
      - no-new-privileges:true
    networks:
      - troxe-internal

volumes:
  pgdata:
    driver: local
  agent-data:
    driver: local
  redisdata:
    driver: local
  panel-uploads:
    driver: local
  caddydata:
    driver: local
  caddyconfig:
    driver: local

networks:
  troxe-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
